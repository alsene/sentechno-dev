<div class="login-container">
  <div class="login-background"></div>
  
  <div class="login-wrapper">
    <div class="login-card">
      <!-- Header -->
      <div class="login-header">
        <div class="login-logo">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <h1 class="login-title">Connexion</h1>
        <p class="login-subtitle">Gestion Produit Zinda Production</p>
      </div>

      <!-- Form -->
      <form (ngSubmit)="login()" #loginForm="ngForm" class="login-form">
        <!-- Email Field -->
        <div class="form-group-login">
          <label for="email" class="form-label-login">
            <i class="icon-email">✉</i>
            Email
          </label>
          <input 
            type="email" 
            id="email" 
            class="form-control-login" 
            [(ngModel)]="email" 
            name="email" 
            placeholder="exemple@email.com"
            required 
            autocomplete="username">
        </div>

        <!-- Password Field -->
        <div class="form-group-login">
          <label for="password" class="form-label-login">
            <i class="icon-lock">🔒</i>
            Mot de passe
          </label>
          <input 
            type="password" 
            id="password" 
            class="form-control-login" 
            [(ngModel)]="password" 
            name="password" 
            placeholder="••••••••"
            required 
            autocomplete="current-password">
        </div>

        <!-- Error Message -->
        <div *ngIf="error" class="alert-error">
          <span class="error-icon">⚠</span>
          {{ error }}
        </div>

        <!-- Submit Button -->
        <button 
          type="submit" 
          class="btn-login" 
          [disabled]="!loginForm.form.valid">
          Se connecter
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn-arrow">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <p class="footer-text">Besoin d'aide? Contactez l'administrateur</p>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<footer class="app-footer">
  <div class="footer-content">
    <p class="footer-copyright">&copy; 2024 Zinda Production. Tous droits réservés.</p>
    <div class="footer-links">
      <a href="#" class="footer-link">Politique de confidentialité</a>
      <a href="#" class="footer-link">Conditions d'utilisation</a>
      <a href="#" class="footer-link">Support</a>
    </div>
  </div>
</footer>
